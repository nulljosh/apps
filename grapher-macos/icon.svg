<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="44" fill="#0d0c0b"/>
  <!-- Grid lines -->
  <line x1="40" y1="60" x2="160" y2="60" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="40" y1="80" x2="160" y2="80" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="40" y1="100" x2="160" y2="100" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="40" y1="120" x2="160" y2="120" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="40" y1="140" x2="160" y2="140" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="60" y1="50" x2="60" y2="155" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="80" y1="50" x2="80" y2="155" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="100" y1="50" x2="100" y2="155" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="120" y1="50" x2="120" y2="155" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="140" y1="50" x2="140" y2="155" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <!-- Axes -->
  <line x1="40" y1="100" x2="160" y2="100" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.5"/>
  <line x1="100" y1="50" x2="100" y2="155" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.5"/>
  <!-- sin curve (orange) -->
  <path d="M 40 100 C 50 70 60 60 70 70 C 80 80 90 130 100 130 C 110 130 120 80 130 70 C 140 60 150 70 160 100" fill="none" stroke="#ff9f0a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- x^2 curve (blue) -->
  <path d="M 40 155 C 55 140 70 115 85 100 C 95 92 100 90 105 92 C 120 98 135 115 150 140 L 160 155" fill="none" stroke="#0071e3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- macOS corner dot indicator -->
  <circle cx="158" cy="42" r="6" fill="#30d158"/>
</svg>
