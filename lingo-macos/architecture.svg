<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background:#fff">
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="20" font-weight="600" fill="#111">Lingo macOS Architecture</text>

  <!-- App Entry -->
  <rect x="330" y="65" width="140" height="40" rx="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="400" y="90" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="13" fill="#111">LingoApp</text>

  <!-- Views Layer -->
  <rect x="40" y="150" width="720" height="120" rx="12" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <text x="60" y="175" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600" fill="#888" letter-spacing="1">VIEWS</text>

  <rect x="60" y="190" width="130" height="60" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="125" y="215" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="12" fill="#111">ContentView</text>
  <text x="125" y="235" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="10" fill="#888">NavigationSplitView</text>

  <rect x="220" y="190" width="130" height="60" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="285" y="215" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="12" fill="#111">QuizView</text>
  <text x="285" y="235" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="10" fill="#888">Quiz Interface</text>

  <rect x="380" y="190" width="130" height="60" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="445" y="215" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="12" fill="#111">ResultsView</text>
  <text x="445" y="235" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="10" fill="#888">Score Display</text>

  <rect x="540" y="190" width="130" height="60" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="605" y="215" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="12" fill="#111">TrophyView</text>
  <text x="605" y="235" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="10" fill="#888">Achievements</text>

  <!-- ViewModels Layer -->
  <rect x="120" y="310" width="560" height="70" rx="12" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <text x="140" y="335" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600" fill="#888" letter-spacing="1">VIEWMODELS</text>

  <rect x="160" y="345" width="160" height="28" rx="6" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="240" y="364" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="12" fill="#111">QuizViewModel</text>

  <rect x="360" y="345" width="160" height="28" rx="6" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="440" y="364" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="12" fill="#111">ProgressManager</text>

  <!-- Models Layer -->
  <rect x="80" y="420" width="640" height="60" rx="12" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <text x="100" y="445" font-family="-apple-system,system-ui,sans-serif" font-size="11" font-weight="600" fill="#888" letter-spacing="1">MODELS</text>

  <rect x="110" y="452" width="90" height="22" rx="4" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="155" y="467" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="10" fill="#111">Question</text>

  <rect x="220" y="452" width="110" height="22" rx="4" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="275" y="467" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="10" fill="#111">QuestionBank</text>

  <rect x="350" y="452" width="80" height="22" rx="4" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="390" y="467" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="10" fill="#111">Subject</text>

  <rect x="450" y="452" width="80" height="22" rx="4" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="490" y="467" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="10" fill="#111">Trophy</text>

  <rect x="550" y="452" width="110" height="22" rx="4" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="605" y="467" text-anchor="middle" font-family="-apple-system,system-ui,sans-serif" font-size="10" fill="#111">UserProgress</text>

  <!-- Arrows -->
  <line x1="400" y1="105" x2="400" y2="150" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="400" y1="270" x2="400" y2="310" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="400" y1="380" x2="400" y2="420" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ccc"/>
    </marker>
  </defs>
</svg>
