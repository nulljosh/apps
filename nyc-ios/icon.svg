<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0e14;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#glow)" rx="24"/>
  <!-- Grid lines (city blocks) -->
  <g opacity=".12" stroke="#00f5d4" stroke-width=".5">
    <line x1="40" y1="30" x2="40" y2="160"/>
    <line x1="70" y1="30" x2="70" y2="160"/>
    <line x1="100" y1="30" x2="100" y2="160"/>
    <line x1="130" y1="30" x2="130" y2="160"/>
    <line x1="160" y1="30" x2="160" y2="160"/>
    <line x1="30" y1="50" x2="170" y2="50"/>
    <line x1="30" y1="80" x2="170" y2="80"/>
    <line x1="30" y1="110" x2="170" y2="110"/>
    <line x1="30" y1="140" x2="170" y2="140"/>
  </g>
  <!-- Buildings (varying heights) -->
  <rect x="42" y="55" width="26" height="55" fill="#00f5d4" opacity=".7" rx="2"/>
  <rect x="72" y="35" width="26" height="75" fill="#f72585" opacity=".65" rx="2"/>
  <rect x="102" y="42" width="26" height="68" fill="#ffe66d" opacity=".7" rx="2"/>
  <rect x="132" y="50" width="26" height="60" fill="#00f5d4" opacity=".5" rx="2"/>
  <!-- Billboard glow on center building -->
  <rect x="78" y="45" width="14" height="8" fill="#f72585" opacity=".9" rx="1"/>
  <rect x="78" y="56" width="14" height="8" fill="#ffe66d" opacity=".8" rx="1"/>
  <!-- Small colonist dots -->
  <circle cx="55" cy="118" r="3" fill="#00f5d4" opacity=".9"/>
  <circle cx="85" cy="125" r="3" fill="#00f5d4" opacity=".7"/>
  <circle cx="115" cy="120" r="3" fill="#00f5d4" opacity=".8"/>
  <circle cx="145" cy="122" r="3" fill="#00f5d4" opacity=".6"/>
  <circle cx="70" cy="145" r="3" fill="#f72585" opacity=".7"/>
  <!-- Subway marker -->
  <rect x="96" y="137" width="8" height="8" fill="#ffe66d" opacity=".9" rx="1"/>
  <!-- Touch indicator (iOS) -->
  <circle cx="115" cy="120" r="8" fill="none" stroke="#00f5d4" stroke-width="1" opacity=".4"/>
  <!-- Title -->
  <text x="100" y="182" fill="#00f5d4" font-family="Menlo,monospace" font-size="14" font-weight="bold" text-anchor="middle" opacity=".9">NYC</text>
  <text x="100" y="194" fill="#fff" font-family="Menlo,monospace" font-size="7" text-anchor="middle" opacity=".35">TIMES SQUARE iOS</text>
</svg>