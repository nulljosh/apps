name: Quest
options:
  bundleIdPrefix: com.heyitsmejosh
  deploymentTarget:
    iOS: '17.0'
settings:
  SWIFT_VERSION: '6.0'
  MARKETING_VERSION: '1.0.0'
  CURRENT_PROJECT_VERSION: '1'
  DEVELOPMENT_TEAM: QMM486NPYC
  CODE_SIGN_STYLE: Automatic
targets:
  Quest:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Assets.xcassets
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.quest
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
      INFOPLIST_KEY_CFBundleDisplayName: Quest
  QuestTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/QuestTests
    dependencies:
      - target: Quest
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.quest.tests
      GENERATE_INFOPLIST_FILE: YES
