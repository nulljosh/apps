<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">
  <rect width="720" height="420" fill="#ffffff" style="fill:#ffffff"/>
  <text x="32" y="44" font-size="18" font-weight="600" fill="#1a1a1a" style="fill:#1a1a1a">School — Architecture</text>

  <!-- lines -->
  <g stroke="#c7c7cc" stroke-width="1.5" style="stroke:#c7c7cc">
    <line x1="180" y1="120" x2="300" y2="120"/>
    <line x1="180" y1="300" x2="300" y2="220"/>
    <line x1="500" y1="160" x2="560" y2="160"/>
    <line x1="500" y1="200" x2="560" y2="200"/>
  </g>

  <!-- web client -->
  <g>
    <rect x="32" y="86" width="148" height="68" rx="12" fill="#f5f5f7" stroke="#d1d1d6" stroke-width="1.5" style="fill:#f5f5f7;stroke:#d1d1d6"/>
    <text x="106" y="116" font-size="13" font-weight="600" text-anchor="middle" fill="#1a1a1a" style="fill:#1a1a1a">Browser</text>
    <text x="106" y="135" font-size="11" text-anchor="middle" fill="#6e6e73" style="fill:#6e6e73">index · masterclass · cram</text>
  </g>

  <!-- native client -->
  <g>
    <rect x="32" y="266" width="148" height="68" rx="12" fill="#f5f5f7" stroke="#d1d1d6" stroke-width="1.5" style="fill:#f5f5f7;stroke:#d1d1d6"/>
    <text x="106" y="296" font-size="13" font-weight="600" text-anchor="middle" fill="#1a1a1a" style="fill:#1a1a1a">SchoolApp</text>
    <text x="106" y="315" font-size="11" text-anchor="middle" fill="#6e6e73" style="fill:#6e6e73">iOS + macOS (SwiftUI)</text>
  </g>

  <!-- middle: views / vercel -->
  <g>
    <rect x="300" y="86" width="200" height="68" rx="12" fill="#eef4ff" stroke="#a9c7ff" stroke-width="1.5" style="fill:#eef4ff;stroke:#a9c7ff"/>
    <text x="400" y="116" font-size="13" font-weight="600" text-anchor="middle" fill="#1a1a1a" style="fill:#1a1a1a">school.heyitsmejosh.com</text>
    <text x="400" y="135" font-size="11" text-anchor="middle" fill="#6e6e73" style="fill:#6e6e73">Vercel static + rewrites</text>
  </g>
  <g>
    <rect x="300" y="186" width="200" height="68" rx="12" fill="#f5f5f7" stroke="#d1d1d6" stroke-width="1.5" style="fill:#f5f5f7;stroke:#d1d1d6"/>
    <text x="400" y="216" font-size="13" font-weight="600" text-anchor="middle" fill="#1a1a1a" style="fill:#1a1a1a">ContentView (TabView)</text>
    <text x="400" y="235" font-size="11" text-anchor="middle" fill="#6e6e73" style="fill:#6e6e73">Grades · Quiz · Study · Plan</text>
  </g>

  <!-- data -->
  <g>
    <rect x="560" y="132" width="128" height="96" rx="12" fill="#f0fff4" stroke="#a9e0bf" stroke-width="1.5" style="fill:#f0fff4;stroke:#a9e0bf"/>
    <text x="624" y="166" font-size="13" font-weight="600" text-anchor="middle" fill="#1a1a1a" style="fill:#1a1a1a">/api</text>
    <text x="624" y="188" font-size="11" text-anchor="middle" fill="#6e6e73" style="fill:#6e6e73">grades.json</text>
    <text x="624" y="206" font-size="11" text-anchor="middle" fill="#6e6e73" style="fill:#6e6e73">quizzes.json</text>
  </g>

  <text x="32" y="392" font-size="11" fill="#8e8e93" style="fill:#8e8e93">Static data + PDFs. iOS APIService fetches /api/grades and /api/quizzes via vercel.json rewrites.</text>
</svg>
