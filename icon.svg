<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="32" style="fill:#1a1a1a"/>
  <!-- Glass panel grid - 2x2 -->
  <rect x="34" y="34" width="58" height="58" rx="14" style="fill:rgba(255,255,255,0.06);stroke:rgba(255,255,255,0.12);stroke-width:1"/>
  <rect x="108" y="34" width="58" height="58" rx="14" style="fill:rgba(255,255,255,0.06);stroke:rgba(255,255,255,0.12);stroke-width:1"/>
  <rect x="34" y="108" width="58" height="58" rx="14" style="fill:rgba(255,255,255,0.06);stroke:rgba(255,255,255,0.12);stroke-width:1"/>
  <rect x="108" y="108" width="58" height="58" rx="14" style="fill:rgba(255,255,255,0.06);stroke:rgba(255,255,255,0.12);stroke-width:1"/>
  <!-- Inner glass highlights - top edge shimmer -->
  <rect x="42" y="38" width="42" height="1" rx="0.5" style="fill:rgba(255,255,255,0.1)"/>
  <rect x="116" y="38" width="42" height="1" rx="0.5" style="fill:rgba(255,255,255,0.1)"/>
  <rect x="42" y="112" width="42" height="1" rx="0.5" style="fill:rgba(255,255,255,0.1)"/>
  <rect x="116" y="112" width="42" height="1" rx="0.5" style="fill:rgba(255,255,255,0.1)"/>
  <!-- App icons inside panels -->
  <circle cx="63" cy="59" r="8" style="fill:rgba(255,255,255,0.08);stroke:rgba(255,255,255,0.2);stroke-width:0.75"/>
  <circle cx="63" cy="59" r="3" style="fill:rgba(255,255,255,0.5)"/>
  <rect x="129" y="51" width="16" height="16" rx="3" style="fill:rgba(255,255,255,0.08);stroke:rgba(255,255,255,0.2);stroke-width:0.75"/>
  <rect x="134" y="56" width="6" height="6" rx="1" style="fill:rgba(255,255,255,0.4)"/>
  <!-- Bottom left - triangle -->
  <path d="M56 127 l14 24 l-28 0 Z" style="fill:rgba(255,255,255,0.08);stroke:rgba(255,255,255,0.2);stroke-width:0.75"/>
  <circle cx="56" cy="140" r="2.5" style="fill:rgba(255,255,255,0.45)"/>
  <!-- Bottom right - lines (list) -->
  <rect x="124" y="130" width="24" height="2" rx="1" style="fill:rgba(255,255,255,0.35)"/>
  <rect x="124" y="137" width="18" height="2" rx="1" style="fill:rgba(255,255,255,0.2)"/>
  <rect x="124" y="144" width="21" height="2" rx="1" style="fill:rgba(255,255,255,0.15)"/>
  <!-- Subtle cross lines between panels -->
  <line x1="100" y1="42" x2="100" y2="84" style="stroke:rgba(255,255,255,0.04);stroke-width:1"/>
  <line x1="42" y1="100" x2="158" y2="100" style="stroke:rgba(255,255,255,0.04);stroke-width:1"/>
</svg>