name: Lingo
options:
  bundleIdPrefix: com.heyitsmejosh
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"

targets:
  Lingo:
    type: application
    platform: iOS
    sources:
      - path: Sources/LingoApp
        includes:
          - "**/*.swift"
      - path: Sources/LingoApp/Resources
        includes:
          - "**/*.json"
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.lingo
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "Lingo"

  LingoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/LingoTests
    dependencies:
      - target: Lingo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.lingo.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Lingo.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Lingo"
        BUNDLE_LOADER: "$(TEST_HOST)"
