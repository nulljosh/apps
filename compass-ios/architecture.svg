<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="white"/>
  <text x="400" y="36" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="18" font-weight="700" fill="#1d1d1f">Compass iOS — Architecture</text>

  <!-- App Layer -->
  <rect x="30" y="60" width="740" height="100" rx="10" fill="#f5f5f7" stroke="#d1d1d6" stroke-width="1.5"/>
  <text x="50" y="85" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#1d1d1f">App Layer (SwiftUI)</text>
  <rect x="50" y="95" width="120" height="48" rx="6" fill="white" stroke="#0071e3" stroke-width="1.5"/>
  <text x="110" y="125" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#1d1d1f">CompassApp</text>
  <rect x="190" y="95" width="120" height="48" rx="6" fill="white" stroke="#0071e3" stroke-width="1.5"/>
  <text x="250" y="125" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#1d1d1f">ContentView</text>
  <rect x="330" y="95" width="120" height="48" rx="6" fill="white" stroke="#0071e3" stroke-width="1.5"/>
  <text x="390" y="125" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#1d1d1f">TabWebView</text>
  <rect x="470" y="95" width="120" height="48" rx="6" fill="white" stroke="#0071e3" stroke-width="1.5"/>
  <text x="530" y="125" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#1d1d1f">CompassWebView</text>
  <rect x="610" y="95" width="140" height="48" rx="6" fill="white" stroke="#34c759" stroke-width="1.5"/>
  <text x="680" y="125" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#1d1d1f">CompassSession</text>

  <!-- WKWebView Layer -->
  <rect x="30" y="200" width="740" height="80" rx="10" fill="#f0f9ff" stroke="#0071e3" stroke-width="1.5"/>
  <text x="50" y="222" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#0071e3">WebKit Layer</text>
  <rect x="50" y="232" width="200" height="36" rx="6" fill="white" stroke="#0071e3" stroke-width="1"/>
  <text x="150" y="255" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#1d1d1f">WKWebView (UIViewRepresentable)</text>
  <rect x="270" y="232" width="160" height="36" rx="6" fill="white" stroke="#0071e3" stroke-width="1"/>
  <text x="350" y="255" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#1d1d1f">WKWebsiteDataStore.default()</text>
  <rect x="450" y="232" width="120" height="36" rx="6" fill="white" stroke="#0071e3" stroke-width="1"/>
  <text x="510" y="255" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#1d1d1f">WKProcessPool</text>
  <rect x="590" y="232" width="160" height="36" rx="6" fill="white" stroke="#0071e3" stroke-width="1"/>
  <text x="670" y="255" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" fill="#1d1d1f">NavigationDelegate</text>

  <!-- Remote -->
  <rect x="30" y="330" width="740" height="60" rx="10" fill="#f5f5f7" stroke="#d1d1d6" stroke-width="1.5"/>
  <text x="50" y="352" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#1d1d1f">Remote (compasscard.ca)</text>
  <rect x="50" y="360" width="100" height="22" rx="4" fill="white" stroke="#d1d1d6" stroke-width="1"/>
  <text x="100" y="375" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#1d1d1f">/ (Home)</text>
  <rect x="160" y="360" width="100" height="22" rx="4" fill="white" stroke="#d1d1d6" stroke-width="1"/>
  <text x="210" y="375" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#1d1d1f">/LoadValue</text>
  <rect x="270" y="360" width="100" height="22" rx="4" fill="white" stroke="#d1d1d6" stroke-width="1"/>
  <text x="320" y="375" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#1d1d1f">/CardUse</text>
  <rect x="380" y="360" width="100" height="22" rx="4" fill="white" stroke="#d1d1d6" stroke-width="1"/>
  <text x="430" y="375" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#1d1d1f">/MyAccount</text>

  <!-- Arrows -->
  <line x1="400" y1="160" x2="400" y2="198" stroke="#d1d1d6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="280" x2="400" y2="328" stroke="#d1d1d6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#d1d1d6"/>
    </marker>
  </defs>
</svg>
