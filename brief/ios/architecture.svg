<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320" style="background:#fff;font-family:-apple-system,sans-serif;">
  <text x="300" y="28" text-anchor="middle" fill="#1d1d1f" font-size="13" font-weight="600">Brief iOS — Architecture</text>
  <!-- App -->
  <rect x="240" y="50" width="120" height="40" rx="8" fill="#f5f5f7" stroke="#d1d1d6" stroke-width="1"/>
  <text x="300" y="75" text-anchor="middle" fill="#1d1d1f" font-size="12" font-weight="600">BriefApp</text>
  <!-- Line down -->
  <line x1="300" y1="90" x2="300" y2="115" stroke="#d1d1d6" stroke-width="1.5"/>
  <!-- Store -->
  <rect x="400" y="50" width="120" height="40" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="460" y="75" text-anchor="middle" fill="#1d1d1f" font-size="12" font-weight="600">Store</text>
  <line x1="360" y1="70" x2="400" y2="70" stroke="#d1d1d6" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- ContentView -->
  <rect x="220" y="115" width="160" height="40" rx="8" fill="#f5f5f7" stroke="#d1d1d6" stroke-width="1"/>
  <text x="300" y="140" text-anchor="middle" fill="#1d1d1f" font-size="12" font-weight="600">ContentView (TabView)</text>
  <!-- 3 lines down -->
  <line x1="140" y1="155" x2="140" y2="185" stroke="#d1d1d6" stroke-width="1.5"/>
  <line x1="300" y1="155" x2="300" y2="185" stroke="#d1d1d6" stroke-width="1.5"/>
  <line x1="460" y1="155" x2="460" y2="185" stroke="#d1d1d6" stroke-width="1.5"/>
  <line x1="140" y1="155" x2="460" y2="155" stroke="#d1d1d6" stroke-width="1.5"/>
  <!-- Tabs -->
  <rect x="60" y="185" width="160" height="40" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
  <text x="140" y="210" text-anchor="middle" fill="#1d1d1f" font-size="12" font-weight="600">CaseTabView</text>
  <rect x="220" y="185" width="160" height="40" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
  <text x="300" y="210" text-anchor="middle" fill="#1d1d1f" font-size="12" font-weight="600">MoneyTabView</text>
  <rect x="380" y="185" width="160" height="40" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
  <text x="460" y="210" text-anchor="middle" fill="#1d1d1f" font-size="12" font-weight="600">ActionsTabView</text>
  <!-- Storage -->
  <rect x="60" y="275" width="160" height="35" rx="8" fill="#e3f2fd" stroke="#2196f3" stroke-width="1"/>
  <text x="140" y="297" text-anchor="middle" fill="#1d1d1f" font-size="11" font-weight="500">UserDefaults (Store)</text>
  <line x1="140" y1="225" x2="140" y2="275" stroke="#d1d1d6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="460" y1="225" x2="460" y2="293" stroke="#d1d1d6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="220" y1="293" x2="460" y2="293" stroke="#d1d1d6" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- CaseData -->
  <rect x="380" y="275" width="160" height="35" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="1"/>
  <text x="460" y="297" text-anchor="middle" fill="#1d1d1f" font-size="11" font-weight="500">CaseData (constants)</text>
</svg>
