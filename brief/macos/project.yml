name: Brief
options:
  bundleIdPrefix: com.nulljosh
  deploymentTarget:
    macOS: "14.0"
packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: 2.0.0
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: QMM486NPYC
targets:
  Brief:
    type: application
    platform: macOS
    sources:
      - Sources
      - path: Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.brief-macos
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
