name: BCGDashboardMac
options:
  bundleIdPrefix: com.heyitsmejosh
  deploymentTarget:
    macOS: "14.0"
settings:
  DEVELOPMENT_TEAM: QMM486NPYC
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  BCGDashboardMac:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - "*.xcodeproj"
          - "*.yml"
          - ".git"
          - ".gitignore"
          - "README.md"
          - "CLAUDE.md"
          - "icon.svg"
          - "architecture.svg"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.bcgd.mac
      GENERATE_INFOPLIST_FILE: YES
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      CODE_SIGN_STYLE: Automatic
      INFOPLIST_KEY_NSHumanReadableCopyright: ""
      INFOPLIST_KEY_CFBundleDisplayName: BC Garage Doors
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
