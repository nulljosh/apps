name: JournalMac
options:
  bundleIdPrefix: com.nulljosh
  deploymentTarget:
    macOS: "14.0"
settings:
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
  DEVELOPMENT_TEAM: QMM486NPYC
targets:
  JournalMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Assets.xcassets
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.journal-mac
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ENABLE_HARDENED_RUNTIME: YES
      GENERATE_INFOPLIST_FILE: YES
  JournalMacTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests]
    dependencies:
      - target: JournalMac
