name: ClaudeUsageIOS
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  DEVELOPMENT_TEAM: QMM486NPYC
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ClaudeUsageIOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.claude-usage-ios
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Claude Usage
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: "MIT 2026 Joshua Trommel"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
  ClaudeUsageIOSWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Widget
    dependencies:
      - target: ClaudeUsageIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.claude-usage-ios.widget
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Usage Widget
        INFOPLIST_KEY_NSExtensionPointIdentifier: com.apple.widgetkit-extension
  ClaudeUsageIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: ClaudeUsageIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.claude-usage-ios.tests
        GENERATE_INFOPLIST_FILE: YES
