name: DoseMac
options:
  bundleIdPrefix: com.heyitsmejosh
  deploymentTarget:
    macOS: '14.0'
settings:
  SWIFT_VERSION: '6.0'
  MARKETING_VERSION: '2.0.0'
  CURRENT_PROJECT_VERSION: '1'
  DEVELOPMENT_TEAM: QMM486NPYC
  CODE_SIGN_STYLE: Automatic
targets:
  DoseMac:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - '*.xcodeproj'
          - '*.yml'
          - README.md
          - CLAUDE.md
          - icon.svg
          - architecture.svg
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.dose.mac
      GENERATE_INFOPLIST_FILE: YES
schemes:
  DoseMac:
    build:
      targets:
        DoseMac: all
    run:
      config: Debug
