<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parallax</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
    }

    #scene {
      width: 100%;
      height: 100%;
      perspective: 800px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #world {
      position: relative;
      width: 600px;
      height: 400px;
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out;
    }

    .layer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
    }

    .layer-bg {
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 100%);
      border-radius: 16px;
      border: 1px solid #ffffff10;
    }

    .layer-mid .card {
      width: 280px;
      padding: 24px;
      background: #ffffff08;
      border: 1px solid #ffffff15;
      border-radius: 12px;
      transform: translateZ(40px);
      backdrop-filter: blur(20px);
    }

    .layer-mid .card h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #f0f0f0;
    }

    .layer-mid .card p {
      font-size: 0.85rem;
      color: #888;
      line-height: 1.5;
    }

    .layer-front .orb {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #0071e3;
      transform: translateZ(90px) translate(-120px, -80px);
      filter: blur(1px);
      opacity: 0.8;
    }

    .layer-front .orb2 {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #5856d6;
      transform: translateZ(70px) translate(140px, 60px);
      filter: blur(1px);
      opacity: 0.7;
    }

    #video-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 120px;
      height: 90px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #ffffff20;
      background: #111;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      opacity: 0.7;
    }

    #canvas {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 120px;
      height: 90px;
      border-radius: 8px;
      display: none;
    }

    #status {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: #666;
      background: #ffffff08;
      border: 1px solid #ffffff10;
      border-radius: 100px;
      padding: 6px 14px;
      letter-spacing: 0.05em;
    }

    #status.active { color: #30d158; border-color: #30d15830; }
    #status.error { color: #ff453a; border-color: #ff453a30; }
  </style>
</head>
<body>

<div id="scene">
  <div id="world">
    <div class="layer layer-bg"></div>
    <div class="layer layer-mid">
      <div class="card">
        <h2>Head Parallax</h2>
        <p>Move your head to shift the 3D perspective. Lean in or back to zoom.</p>
      </div>
    </div>
    <div class="layer layer-front">
      <div class="orb"></div>
      <div class="orb2"></div>
    </div>
  </div>
</div>

<div id="video-container">
  <video id="video" autoplay playsinline muted></video>
</div>

<div id="status">requesting camera...</div>

<script type="module">
  import { FaceLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

  const world = document.getElementById('world');
  const status = document.getElementById('status');
  const video = document.getElementById('video');

  let faceLandmarker = null;
  let lastVideoTime = -1;

  // smoothed head position
  let smoothX = 0, smoothY = 0, smoothZ = 0;
  const SMOOTH = 0.12;

  async function init() {
    // load mediapipe
    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );

    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
        delegate: 'GPU'
      },
      runningMode: 'VIDEO',
      numFaces: 1
    });

    // get camera
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
      video.srcObject = stream;
      video.addEventListener('loadeddata', () => {
        status.textContent = 'tracking';
        status.className = 'active';
        requestAnimationFrame(detect);
      });
    } catch (e) {
      status.textContent = 'camera denied';
      status.className = 'error';
    }
  }

  function detect() {
    if (video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;
      const results = faceLandmarker.detectForVideo(video, performance.now());

      if (results.faceLandmarks && results.faceLandmarks.length > 0) {
        const lm = results.faceLandmarks[0];

        // nose tip = landmark 1, use it as head center proxy
        const nose = lm[1];
        // center is 0.5, map to -1..1 range
        const rawX = (nose.x - 0.5) * 2;
        const rawY = (nose.y - 0.5) * 2;
        // z from mediapipe is relative depth — negative = closer
        const rawZ = nose.z;

        // smooth
        smoothX += (rawX - smoothX) * SMOOTH;
        smoothY += (rawY - smoothY) * SMOOTH;
        smoothZ += (rawZ - smoothZ) * SMOOTH;

        // map to rotation + perspective
        const rotY = smoothX * -20;    // head right = scene tilts right
        const rotX = smoothY * 15;     // head up = scene tilts up
        const zShift = smoothZ * 300;  // closer = zoom in

        world.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) translateZ(${zShift}px)`;
      }
    }

    requestAnimationFrame(detect);
  }

  init();
</script>

</body>
</html>
