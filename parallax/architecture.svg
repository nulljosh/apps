<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" font-family="-apple-system,BlinkMacSystemFont,sans-serif">
  <rect width="800" height="400" fill="#ffffff"/>

  <!-- Webcam -->
  <rect x="40" y="160" width="120" height="80" rx="8" fill="#f5f5f7" stroke="#d1d1d6" stroke-width="1.5"/>
  <text x="100" y="196" text-anchor="middle" font-size="11" fill="#1d1d1f" font-weight="600">Webcam</text>
  <text x="100" y="212" text-anchor="middle" font-size="10" fill="#6e6e73">getUserMedia</text>
  <text x="100" y="226" text-anchor="middle" font-size="10" fill="#6e6e73">video stream</text>

  <!-- Arrow 1 -->
  <line x1="160" y1="200" x2="205" y2="200" stroke="#1d1d1f" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="182" y="194" text-anchor="middle" font-size="9" fill="#6e6e73">frames</text>

  <!-- MediaPipe -->
  <rect x="210" y="150" width="140" height="100" rx="8" fill="#f5f5f7" stroke="#d1d1d6" stroke-width="1.5"/>
  <text x="280" y="186" text-anchor="middle" font-size="11" fill="#1d1d1f" font-weight="600">MediaPipe</text>
  <text x="280" y="202" text-anchor="middle" font-size="10" fill="#6e6e73">FaceLandmarker</text>
  <text x="280" y="218" text-anchor="middle" font-size="10" fill="#6e6e73">478 landmarks</text>
  <text x="280" y="234" text-anchor="middle" font-size="10" fill="#6e6e73">GPU delegate</text>

  <!-- Arrow 2 -->
  <line x1="350" y1="200" x2="395" y2="200" stroke="#1d1d1f" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="372" y="194" text-anchor="middle" font-size="9" fill="#6e6e73">x,y,z</text>

  <!-- Head Tracker -->
  <rect x="400" y="150" width="140" height="100" rx="8" fill="#f5f5f7" stroke="#d1d1d6" stroke-width="1.5"/>
  <text x="470" y="186" text-anchor="middle" font-size="11" fill="#1d1d1f" font-weight="600">Head Tracker</text>
  <text x="470" y="202" text-anchor="middle" font-size="10" fill="#6e6e73">nose tip (lm[1])</text>
  <text x="470" y="218" text-anchor="middle" font-size="10" fill="#6e6e73">LERP smoothing</text>
  <text x="470" y="234" text-anchor="middle" font-size="10" fill="#6e6e73">rotX / rotY / Z</text>

  <!-- Arrow 3 -->
  <line x1="540" y1="200" x2="585" y2="200" stroke="#1d1d1f" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="562" y="194" text-anchor="middle" font-size="9" fill="#6e6e73">transform</text>

  <!-- CSS 3D Scene -->
  <rect x="590" y="150" width="140" height="100" rx="8" fill="#f5f5f7" stroke="#d1d1d6" stroke-width="1.5"/>
  <text x="660" y="186" text-anchor="middle" font-size="11" fill="#1d1d1f" font-weight="600">CSS 3D Scene</text>
  <text x="660" y="202" text-anchor="middle" font-size="10" fill="#6e6e73">preserve-3d layers</text>
  <text x="660" y="218" text-anchor="middle" font-size="10" fill="#6e6e73">translateZ depth</text>
  <text x="660" y="234" text-anchor="middle" font-size="10" fill="#6e6e73">perspective origin</text>

  <!-- Labels -->
  <text x="400" y="50" text-anchor="middle" font-size="16" fill="#1d1d1f" font-weight="700">Parallax — Head-Tracked 3D Architecture</text>
  <text x="400" y="72" text-anchor="middle" font-size="12" fill="#6e6e73">Webcam face detection drives real-time CSS 3D perspective transforms</text>

  <!-- Bottom note -->
  <text x="400" y="310" text-anchor="middle" font-size="10" fill="#6e6e73">All client-side. No server. Runs in any modern browser with camera permission.</text>

  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#1d1d1f"/>
    </marker>
  </defs>
</svg>
