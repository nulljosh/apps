name: Fuse
options:
  bundleIdPrefix: com.heyitsmejosh
  deploymentTarget:
    iOS: '17.0'
settings:
  SWIFT_VERSION: '6.0'
  MARKETING_VERSION: '1.0.0'
  CURRENT_PROJECT_VERSION: '1'
  DEVELOPMENT_TEAM: QMM486NPYC
  CODE_SIGN_STYLE: Automatic
targets:
  Fuse:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - '*.xcodeproj'
          - '*.yml'
          - README.md
          - CLAUDE.md
          - icon.svg
          - architecture.svg
          - '*.entitlements'
          - watchos
    dependencies:
      - target: FuseWatch
    entitlements:
      path: Fuse.entitlements
      properties:
        com.apple.developer.eventkit: true
    settings:
      INFOPLIST_FILE: Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.fuse

  FuseWatch:
    type: application
    platform: watchOS
    sources:
      - path: watchos
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.fuse.watch
      GENERATE_INFOPLIST_FILE: YES
      MARKETING_VERSION: '1.0.0'
      CURRENT_PROJECT_VERSION: '1'
      DEVELOPMENT_TEAM: QMM486NPYC

schemes:
  Fuse:
    build:
      targets:
        Fuse: all
    run:
      config: Debug
