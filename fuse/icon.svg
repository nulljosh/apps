<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="40" fill="#0a0a0a"/>
  <!-- Timeline line -->
  <line x1="30" y1="100" x2="170" y2="100" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- Event dots -->
  <circle cx="60" cy="100" r="6" fill="#0071e3"/>
  <circle cx="100" cy="100" r="6" fill="#ff9f0a"/>
  <circle cx="148" cy="100" r="6" fill="#ff3b30"/>
  <!-- Fuse spark on red dot -->
  <circle cx="148" cy="100" r="12" fill="#ff3b30" opacity="0.2"/>
  <!-- Countdown lines above dots -->
  <line x1="60" y1="94" x2="60" y2="70" stroke="#0071e3" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="94" x2="100" y2="75" stroke="#ff9f0a" stroke-width="2" stroke-linecap="round"/>
  <line x1="148" y1="94" x2="148" y2="68" stroke="#ff3b30" stroke-width="2" stroke-linecap="round"/>
  <!-- Tick marks -->
  <line x1="60" y1="65" x2="60" y2="60" stroke="#0071e3" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="70" x2="100" y2="65" stroke="#ff9f0a" stroke-width="2" stroke-linecap="round"/>
  <line x1="148" y1="63" x2="148" y2="58" stroke="#ff3b30" stroke-width="2" stroke-linecap="round"/>
  <!-- Label text -->
  <text x="100" y="145" font-family="-apple-system, Helvetica" font-size="14" font-weight="700" fill="#f5f5f7" text-anchor="middle" letter-spacing="3">FUSE</text>
</svg>
