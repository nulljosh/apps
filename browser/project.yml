name: Browser
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  DEVELOPMENT_TEAM: QMM486NPYC
  base:
    SWIFT_VERSION: 5.10
    MARKETING_VERSION: 2.0.0
    CURRENT_PROJECT_VERSION: 1
targets:
  Browser:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources
    resources:
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.browser
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: Resources/Browser.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Browser
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSCameraUsageDescription: "Browser needs camera access for websites that request it."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Browser needs microphone access for websites that request it."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Browser needs location access for websites that request it."
  BrowserTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Browser
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.browser.tests
        GENERATE_INFOPLIST_FILE: YES
