name: ClaudeUsage
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  DEVELOPMENT_TEAM: QMM486NPYC
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ClaudeUsage:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.claude-usage
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Claude Usage
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: "MIT 2026 Joshua Trommel"
  ClaudeUsageTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: ClaudeUsage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.claude-usage.tests
        GENERATE_INFOPLIST_FILE: YES
