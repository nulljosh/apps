name: Brief
options:
  bundleIdPrefix: com.nulljosh
  deploymentTarget:
    iOS: "17.0"
  minimumXcodeGenVersion: "2.38.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: QMM486NPYC
targets:
  Brief:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.brief
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_BackgroundColor: LaunchBG
        INFOPLIST_KEY_UILaunchScreen_ImageName: LaunchLogo
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIRequiresFullScreen: YES
