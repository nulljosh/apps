<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Times Square Survival</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="game"></canvas>

    <div id="menu">

            </svg>
        </div>
        <div class="menu-title">TIMES SQUARE</div>
        <div class="menu-subtitle">SURVIVAL SIMULATOR</div>
        <div class="difficulty-picker" id="difficulty-picker" style="margin-bottom:12px;display:flex;gap:8px;justify-content:center;">
            <button class="diff-btn" data-diff="easy">EASY</button>
            <button class="diff-btn" data-diff="medium">MEDIUM</button>
            <button class="diff-btn" data-diff="hard">HARD</button>
        </div>
        <style>
        .diff-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);color:#aaa;padding:4px 14px;font:600 11px/1 monospace;letter-spacing:.08em;cursor:pointer;border-radius:3px;transition:all .15s}
        .diff-btn.selected{background:rgba(255,255,255,0.18);color:#fff;border-color:rgba(255,255,255,0.5)}
        </style>
        <button class="menu-btn" id="menu-new">> NEW GAME</button>
        <div class="menu-load-title">LOAD GAME</div>
        <div id="menu-slots"></div>
    </div>

    <div id="hud">
        <div id="resource-bar"></div>
        <div id="build-menu"></div>
        <div id="colonist-panel"></div>
        <div id="game-log"></div>
        <div id="directive-bar"></div>
        <div id="time-display"></div>
        <div id="minimap-container">
            <canvas id="minimap" width="150" height="150"></canvas>
        </div>
    </div>

    <div id="pause-overlay"></div>
    <div id="save-indicator">SAVED</div>
    <div id="settings-overlay"></div>
    <div id="tutorial-overlay"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
