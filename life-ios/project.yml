name: Life
options:
  bundleIdPrefix: com.nulljosh
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Life:
    type: application
    platform: iOS
    sources:
      - LifeApp.swift
      - Models
      - Views
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.life-ios
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QMM486NPYC
    resources:
      - Assets.xcassets
  LifeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: Life
