name: Life
options:
  bundleIdPrefix: com.nulljosh
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_FILE: Info.plist
targets:
  Life:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - Tests
          - "*.md"
          - "*.svg"
          - LICENSE
          - project.yml
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.life-ios
        INFOPLIST_FILE: Info.plist
  LifeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: Life
