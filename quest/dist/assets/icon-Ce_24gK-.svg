<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" style="background:#1a0f07;border-radius:20px">
  <!-- Leather book cover -->
  <rect x="40" y="30" width="120" height="145" rx="4" fill="#2d1b0e" stroke="#c9a84c" stroke-width="2"/>
  <!-- Book spine -->
  <rect x="40" y="30" width="16" height="145" rx="2" fill="#1a0f07" stroke="#8b6914" stroke-width="1"/>
  <!-- Parchment page -->
  <rect x="62" y="40" width="88" height="125" rx="2" fill="#f4e4c1"/>
  <!-- Wax seal -->
  <circle cx="106" cy="130" r="16" fill="#8b1a1a"/>
  <circle cx="106" cy="130" r="12" fill="#c0392b"/>
  <text x="106" y="135" text-anchor="middle" fill="#f4e4c1" font-family="serif" font-size="14" font-weight="bold">Q</text>
  <!-- Quill -->
  <path d="M130 45 L155 20 L160 25 L140 55 L135 52 Z" fill="#c9a84c" stroke="#8b6914" stroke-width="1"/>
  <path d="M130 45 L135 52 L125 65" fill="none" stroke="#1c1208" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Text lines on page -->
  <line x1="70" y1="55" x2="140" y2="55" stroke="#2a1f0e" stroke-width="1" opacity="0.3"/>
  <line x1="70" y1="65" x2="135" y2="65" stroke="#2a1f0e" stroke-width="1" opacity="0.3"/>
  <line x1="70" y1="75" x2="138" y2="75" stroke="#2a1f0e" stroke-width="1" opacity="0.3"/>
  <line x1="70" y1="85" x2="130" y2="85" stroke="#2a1f0e" stroke-width="1" opacity="0.3"/>
  <line x1="70" y1="95" x2="137" y2="95" stroke="#2a1f0e" stroke-width="1" opacity="0.3"/>
  <line x1="70" y1="105" x2="133" y2="105" stroke="#2a1f0e" stroke-width="1" opacity="0.3"/>
  <!-- Gold corner decorations -->
  <path d="M62 40 L72 40 L62 50 Z" fill="#c9a84c" opacity="0.4"/>
  <path d="M150 40 L140 40 L150 50 Z" fill="#c9a84c" opacity="0.4"/>
  <path d="M62 165 L72 165 L62 155 Z" fill="#c9a84c" opacity="0.4"/>
  <path d="M150 165 L140 165 L150 155 Z" fill="#c9a84c" opacity="0.4"/>
</svg>
