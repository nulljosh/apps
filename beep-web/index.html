<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Beep">
  <title>Beep</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #0071e3;
      --blue-dark: #005bb5;
      --bg: #f2f2f7;
      --card: rgba(255,255,255,0.85);
      --text: #1d1d1f;
      --sub: #6e6e73;
      --border: rgba(0,0,0,0.08);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --card: rgba(44,44,46,0.85);
        --text: #f5f5f7;
        --sub: #98989d;
        --border: rgba(255,255,255,0.1);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: calc(24px + env(safe-area-inset-top, 0px)) 20px calc(24px + var(--safe-bottom));
      gap: 24px;
    }

    header {
      text-align: center;
      margin-top: 8vh;
    }

    header h1 {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      color: var(--sub);
      font-size: 15px;
      margin-top: 6px;
    }

    main {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--blue);
      color: #fff;
      text-decoration: none;
      font-size: 17px;
      font-weight: 600;
      padding: 16px;
      border-radius: 16px;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), background 0.15s;
    }

    .cta:active { transform: scale(0.97); background: var(--blue-dark); }

    .links {
      display: flex;
      flex-direction: column;
      background: var(--card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .links a {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 16px;
      color: var(--text);
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .links a:last-child { border-bottom: none; }
    .links a:active { background: rgba(0,113,227,0.08); }

    .links svg { width: 22px; height: 22px; color: var(--blue); flex-shrink: 0; }

    .links .chev { margin-left: auto; color: var(--sub); width: 8px; }

    footer {
      color: var(--sub);
      font-size: 12px;
      text-align: center;
      max-width: 420px;
      line-height: 1.5;
      margin-top: auto;
    }
  </style>
</head>
<body>

<header>
  <h1>Beep</h1>
  <p>Compass Card</p>
</header>

<main>
  <a class="cta" href="https://www.compasscard.ca/" target="_blank" rel="noopener">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="5" width="20" height="14" rx="2"/>
      <line x1="2" y1="10" x2="22" y2="10"/>
    </svg>
    Open Compass Card
  </a>

  <div class="links">
    <a href="https://www.compasscard.ca/LoadValue" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      Reload Balance
      <svg class="chev" viewBox="0 0 10 18" fill="none"><path d="M1 1l8 8-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a href="https://www.compasscard.ca/CardUse" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21l8 0"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
      Trips &amp; Usage
      <svg class="chev" viewBox="0 0 10 18" fill="none"><path d="M1 1l8 8-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a href="https://www.compasscard.ca/MyAccount" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.58-7 8-7s8 3 8 7"/>
      </svg>
      My Account
      <svg class="chev" viewBox="0 0 10 18" fill="none"><path d="M1 1l8 8-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
  </div>
</main>

<footer>
  Opens compasscard.ca in your browser. TransLink's site blocks embedding, so Beep links out to keep login working.
</footer>

</body>
</html>
