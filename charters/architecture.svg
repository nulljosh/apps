  <!-- Legend -->
  <rect x="32" y="454" width="12" height="12" rx="3" style="fill:#f5f5f7;stroke:#0071e3;stroke-width:1.5"/>
  <text x="50" y="464" style="font-size:9px;fill:#6e6e73">Primary layer</text>
  <rect x="130" y="454" width="12" height="12" rx="3" style="fill:#fff;stroke:#d2d2d7;stroke-width:1.2"/>
  <text x="148" y="464" style="font-size:9px;fill:#6e6e73">Feature</text>
  <rect x="210" y="454" width="20" height="2" rx="1" style="fill:#c7c7cc"/>
  <text x="236" y="464" style="font-size:9px;fill:#6e6e73">Data flow</text>
