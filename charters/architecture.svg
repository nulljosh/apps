  <rect x="522" y="310" width="96" height="36" rx="8" style="fill:#fff;stroke:#d2d2d7;stroke-width:1.2"/>
  <text x="570" y="329" style="font-size:9px;font-weight:500;fill:#1d1d1f;text-anchor:middle">CountryList</text>
  <text x="570" y="340" style="font-size:8px;fill:#8e8e93;text-anchor:middle">Search + filter</text>

  <rect x="590" y="310" width="96" height="36" rx="8" style="fill:#fff;stroke:#d2d2d7;stroke-width:1.2"/>
  <text x="638" y="329" style="font-size:9px;font-weight:500;fill:#1d1d1f;text-anchor:middle">CountryDetail</text>
  <text x="638" y="340" style="font-size:8px;fill:#8e8e93;text-anchor:middle">Docs + articles</text>

  <rect x="658" y="310" width="96" height="36" rx="8" style="fill:#fff;stroke:#d2d2d7;stroke-width:1.2"/>
  <text x="706" y="329" style="font-size:9px;font-weight:500;fill:#1d1d1f;text-anchor:middle">ArticleDetail</text>
  <text x="706" y="340" style="font-size:8px;fill:#8e8e93;text-anchor:middle">Full text + tags</text>

  <rect x="726" y="310" width="96" height="36" rx="8" style="fill:#fff;stroke:#d2d2d7;stroke-width:1.2"/>
  <text x="774" y="329" style="font-size:9px;font-weight:500;fill:#1d1d1f;text-anchor:middle">Compare</text>
  <text x="774" y="340" style="font-size:8px;fill:#8e8e93;text-anchor:middle">Two-column view</text>

