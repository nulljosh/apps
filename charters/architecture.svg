  <rect x="80" y="310" width="96" height="36" rx="8" style="fill:#fff;stroke:#d2d2d7;stroke-width:1.2"/>
  <text x="128" y="329" style="font-size:9px;font-weight:500;fill:#1d1d1f;text-anchor:middle">Map View</text>
  <text x="128" y="340" style="font-size:8px;fill:#8e8e93;text-anchor:middle">SVG world map</text>

  <rect x="148" y="310" width="96" height="36" rx="8" style="fill:#fff;stroke:#d2d2d7;stroke-width:1.2"/>
  <text x="196" y="329" style="font-size:9px;font-weight:500;fill:#1d1d1f;text-anchor:middle">List View</text>
  <text x="196" y="340" style="font-size:8px;fill:#8e8e93;text-anchor:middle">Country grid</text>

  <rect x="216" y="310" width="96" height="36" rx="8" style="fill:#fff;stroke:#d2d2d7;stroke-width:1.2"/>
  <text x="264" y="329" style="font-size:9px;font-weight:500;fill:#1d1d1f;text-anchor:middle">Compare View</text>
  <text x="264" y="340" style="font-size:8px;fill:#8e8e93;text-anchor:middle">Side-by-side</text>

  <rect x="284" y="310" width="96" height="36" rx="8" style="fill:#fff;stroke:#d2d2d7;stroke-width:1.2"/>
  <text x="332" y="329" style="font-size:9px;font-weight:500;fill:#1d1d1f;text-anchor:middle">Search + Filter</text>
  <text x="332" y="340" style="font-size:8px;fill:#8e8e93;text-anchor:middle">5 categories</text>

  <!-- iOS features connectors -->
  <line x1="600" y1="247" x2="570" y2="310" style="stroke:#c7c7cc;stroke-width:1.2"/>
  <line x1="640" y1="247" x2="638" y2="310" style="stroke:#c7c7cc;stroke-width:1.2"/>
  <line x1="700" y1="247" x2="706" y2="310" style="stroke:#c7c7cc;stroke-width:1.2"/>
  <line x1="740" y1="247" x2="774" y2="310" style="stroke:#c7c7cc;stroke-width:1.2"/>

