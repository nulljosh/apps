<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:#fff">
  <!-- Title -->
  <text x="450" y="32" style="font-size:13px;font-weight:600;fill:#1d1d1f;text-anchor:middle;letter-spacing:-.02em">Charters — Architecture</text>

  <!-- Data Layer -->
  <rect x="340" y="56" width="220" height="64" rx="12" style="fill:#f5f5f7;stroke:#d2d2d7;stroke-width:1.5"/>
  <text x="450" y="82" style="font-size:11px;font-weight:600;fill:#1d1d1f;text-anchor:middle">Constitutional Data</text>
  <text x="450" y="98" style="font-size:9.5px;fill:#6e6e73;text-anchor:middle">15 countries · 23 documents · 146 articles</text>
  <text x="450" y="111" style="font-size:9px;fill:#8e8e93;text-anchor:middle">Static — JS array / Swift struct array</text>

  <!-- Vertical connector down -->
  <line x1="350" y1="120" x2="230" y2="175" style="stroke:#c7c7cc;stroke-width:1.5;stroke-dasharray:4 3"/>
  <line x1="550" y1="120" x2="670" y2="175" style="stroke:#c7c7cc;stroke-width:1.5;stroke-dasharray:4 3"/>

  <!-- Web App box -->
  <rect x="100" y="175" width="260" height="72" rx="12" style="fill:#f5f5f7;stroke:#0071e3;stroke-width:1.5"/>
  <text x="230" y="200" style="font-size:11px;font-weight:600;fill:#0071e3;text-anchor:middle">Web App</text>
  <text x="230" y="215" style="font-size:9.5px;fill:#1d1d1f;text-anchor:middle">index.html — Single-file static app</text>
  <text x="230" y="228" style="font-size:9px;fill:#6e6e73;text-anchor:middle">Vercel · charters.heyitsmejosh.com</text>

  <!-- iOS App box -->
  <rect x="540" y="175" width="260" height="72" rx="12" style="fill:#f5f5f7;stroke:#0071e3;stroke-width:1.5"/>
  <text x="670" y="200" style="font-size:11px;font-weight:600;fill:#0071e3;text-anchor:middle">iOS App</text>
  <text x="670" y="215" style="font-size:9.5px;fill:#1d1d1f;text-anchor:middle">SwiftUI · Universal (iPhone + iPad)</text>
  <text x="670" y="228" style="font-size:9px;fill:#6e6e73;text-anchor:middle">iOS 17+ · xcodegen</text>

  <!-- Web features connectors -->
  <line x1="160" y1="247" x2="130" y2="310" style="stroke:#c7c7cc;stroke-width:1.2"/>
  <line x1="195" y1="247" x2="196" y2="310" style="stroke:#c7c7cc;stroke-width:1.2"/>
  <line x1="230" y1="247" x2="260" y2="310" style="stroke:#c7c7cc;stroke-width:1.2"/>
  <line x1="265" y1="247" x2="322" y2="310" style="stroke:#c7c7cc;stroke-width:1.2"/>

