let AF='all',AC=null,CV='map',CC1=null,CC2=null;

function cTags(c){const s=new Set();c.docs.forEach(d=>d.arts.forEach(a=>a.tags.forEach(t=>s.add(t))));return[...s];}
function docCt(c){return c.docs.length===1?'1 document':c.docs.length+' documents';}
function cMatch(c){return AF==='all'||c.docs.some(d=>d.arts.some(a=>a.tags.includes(AF)));}
function totalArts(c){return c.docs.reduce((a,d)=>a+d.arts.length,0);}

function renderStats(){
  const nc=D.length,nd=D.reduce((a,x)=>a+x.docs.length,0),na=D.reduce((a,x)=>a+x.docs.reduce((b,y)=>b+y.arts.length,0),0);
  document.getElementById('stbar').textContent=nc+' constitutions · '+nd+' documents · '+na+' articles';
}

function artHtml(a){
  return '<div class="ar"><div class="aref">'+a.ref+'</div><div class="atit">'+a.title+'</div><div class="atxt">'+a.text+'</div><div class="atgs">'+a.tags.map(t=>'<span class="tag '+t+'">'+t+'</span>').join('')+'</div></div>';
}

function renderList(){
  const g=document.getElementById('cg');
  g.innerHTML='';
  D.forEach(c=>{
    const el=document.createElement('div');
    el.className='cc fu'+(cMatch(c)?'':' h')+(AC===c.id?' sel':'');
    el.dataset.id=c.id;
    const tags=cTags(c);
    const docsHtml=c.docs.map(d=>'<div class="dr"><span>'+d.title+'</span><span class="dy">'+d.year+'</span></div>').join('');
    const tagsHtml=tags.map(t=>'<span class="tag '+t+'">'+t+'</span>').join('');
    el.innerHTML='<div class="ch"><div><div class="cn">'+c.name+'</div><div class="cr">'+c.region+'</div></div><div class="cb">'+docCt(c)+'</div></div><div class="cd">'+docsHtml+'</div><div class="tgs">'+tagsHtml+'</div>';
    el.addEventListener('click',()=>openPanel(c.id));
    g.appendChild(el);
  });
}

function openPanel(id){
  const c=D.find(x=>x.id===id);if(!c)return;
  AC=id;
  document.querySelectorAll('.co,.eu').forEach(e=>e.classList.remove('sel'));
  const m=document.getElementById('m-'+id);if(m)m.classList.add('sel');
  document.querySelectorAll('.cc').forEach(e=>e.classList.toggle('sel',e.dataset.id===id));
  document.getElementById('pc').textContent=c.name;
  document.getElementById('pr').textContent=c.region;
  document.getElementById('ps').value='';
  renderPanel(c,'');
  document.getElementById('pan').classList.add('op');
  document.getElementById('ov').classList.add('on');
  history.replaceState(null,'','#'+id);
}

function closePanel(){
  document.getElementById('pan').classList.remove('op');
  document.getElementById('ov').classList.remove('on');
  document.querySelectorAll('.co,.eu').forEach(e=>e.classList.remove('sel'));
  document.querySelectorAll('.cc').forEach(e=>e.classList.remove('sel'));
  AC=null;
  if(CV!=='compare')history.replaceState(null,'','#');
}

function renderPanel(c,q){
  const ql=q.toLowerCase().trim();
  let html='';
  c.docs.forEach(d=>{
    const fa=d.arts.filter(a=>{
      if(AF!=='all'&&!a.tags.includes(AF))return false;
      if(!ql)return true;
      return a.title.toLowerCase().includes(ql)||a.text.toLowerCase().includes(ql)||a.ref.toLowerCase().includes(ql);
    });
    if(!fa.length)return;
    html+='<div class="db"><div class="dt">'+d.title+'</div><div class="dm"><span class="dy2">'+d.year+'</span><span>'+d.parent+'</span></div><div class="al">'+fa.map(artHtml).join('')+'</div></div>';
  });
  document.getElementById('pb').innerHTML=html||'<div style="padding:18px;text-align:center;color:var(--muted);font-size:.82rem">No articles match the current filter.</div>';
}

function renderCompareCol(colId,cid){
  const c=D.find(x=>x.id===cid);
  if(!c){
    const msg=colId==='cp1'?'Select a country above to begin comparing':'Select a second country to compare';
    document.getElementById(colId).innerHTML='<div class="cpe">'+msg+'</div>';
    return;
  }
  let html='<div class="cph">'+c.name+' <span style="font-size:.7rem;font-weight:400;color:var(--muted)">'+c.region+'</span></div>';
  let matched=0;
  c.docs.forEach(d=>{
    const fa=d.arts.filter(a=>AF==='all'||a.tags.includes(AF));
    if(!fa.length)return;
    matched+=fa.length;
    html+='<div class="db"><div class="dt">'+d.title+'</div><div class="dm"><span class="dy2">'+d.year+'</span><span>'+d.parent+'</span></div><div class="al">'+fa.map(artHtml).join('')+'</div></div>';
  });
  if(!matched)html+='<div class="cpe">No articles match the current filter.</div>';
  document.getElementById(colId).innerHTML=html;
}

function renderCompare(){
  renderCompareCol('cp1',CC1);
  renderCompareCol('cp2',CC2);
  if(CC1||CC2){
    history.replaceState(null,'',CC1&&CC2?'#compare/'+CC1+','+CC2:'#compare');
  }
}

function populateCompareSelects(){
  const opts=D.map(c=>'<option value="'+c.id+'">'+c.name+'</option>').join('');
  document.getElementById('cs1').innerHTML='<option value="">Select country A...</option>'+opts;
  document.getElementById('cs2').innerHTML='<option value="">Select country B...</option>'+opts;
}

function switchView(v){
  CV=v;
  document.getElementById('mv').classList.toggle('h',v!=='map');
  document.getElementById('lv').classList.toggle('h',v!=='list');
  document.getElementById('cpv').classList.toggle('h',v!=='compare');
  document.getElementById('bm').classList.toggle('on',v==='map');
  document.getElementById('bl').classList.toggle('on',v==='list');
  document.getElementById('bc').classList.toggle('on',v==='compare');
  if(v==='list')renderList();
  if(v==='compare')renderCompare();
}

function loadHash(){
  const h=location.hash.slice(1);
  if(!h)return;
  if(h.startsWith('compare')){
    switchView('compare');
    const rest=h.replace(/^compare\/?/,'');
    const parts=rest.split(',');
    if(parts[0]&&D.find(x=>x.id===parts[0])){CC1=parts[0];document.getElementById('cs1').value=parts[0];}
    if(parts[1]&&D.find(x=>x.id===parts[1])){CC2=parts[1];document.getElementById('cs2').value=parts[1];}
    renderCompare();
  } else {
    const c=D.find(x=>x.id===h.toUpperCase()||x.id===h);
    if(c)openPanel(c.id);
  }
}

function initMap(){
  const tip=document.getElementById('tip');
  document.querySelectorAll('.co,.eu').forEach(el=>{
    const id=el.dataset.id;
    const c=D.find(x=>x.id===id);if(!c)return;
    const arts=totalArts(c);
    el.addEventListener('mouseenter',()=>{tip.textContent=c.name+' — '+arts+' article'+(arts!==1?'s':'');tip.style.opacity='1';});
    el.addEventListener('mousemove',e=>{tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-8)+'px';});
    el.addEventListener('mouseleave',()=>{tip.style.opacity='0';});
    el.addEventListener('click',()=>{tip.style.opacity='0';openPanel(id);});
  });
  document.querySelectorAll('text[data-id]').forEach(el=>{
    el.style.cursor='pointer';
    el.addEventListener('click',()=>openPanel(el.dataset.id));
  });
}

const gs=document.getElementById('gs'),sd=document.getElementById('sd');
gs.addEventListener('input',()=>{
  const q=gs.value.toLowerCase().trim();
  if(!q){sd.classList.remove('op');return;}
  const res=[];
  D.forEach(c=>c.docs.forEach(d=>d.arts.forEach(a=>{
    if(a.title.toLowerCase().includes(q)||a.text.toLowerCase().includes(q))res.push({c,a});
  })));
  if(!res.length){
    sd.innerHTML='<div class="sre">No results found.</div>';
  } else {
    sd.innerHTML=res.slice(0,16).map(r=>'<div class="sri" data-id="'+r.c.id+'"><div class="src">'+r.c.name+'</div><div class="srt">'+r.a.ref+' — '+r.a.title+'</div><div class="srx">'+r.a.text+'</div></div>').join('');
    sd.querySelectorAll('.sri').forEach(e=>e.addEventListener('click',()=>{gs.value='';sd.classList.remove('op');openPanel(e.dataset.id);}));
  }
  sd.classList.add('op');
});
document.addEventListener('click',e=>{if(!gs.contains(e.target)&&!sd.contains(e.target))sd.classList.remove('op');});

document.getElementById('bm').addEventListener('click',()=>switchView('map'));
document.getElementById('bl').addEventListener('click',()=>switchView('list'));
document.getElementById('bc').addEventListener('click',()=>switchView('compare'));

document.querySelectorAll('.fb').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');AF=b.dataset.f;
  if(CV==='list')renderList();
  if(CV==='compare')renderCompare();
  if(AC){const c=D.find(x=>x.id===AC);if(c)renderPanel(c,document.getElementById('ps').value);}
}));

document.getElementById('ps').addEventListener('input',e=>{if(!AC)return;const c=D.find(x=>x.id===AC);if(c)renderPanel(c,e.target.value);});
document.getElementById('cs1').addEventListener('change',e=>{CC1=e.target.value||null;renderCompare();});
document.getElementById('cs2').addEventListener('change',e=>{CC2=e.target.value||null;renderCompare();});
document.getElementById('pcl').addEventListener('click',closePanel);
document.getElementById('ov').addEventListener('click',()=>{closePanel();closeProfile();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(AC)closePanel();closeProfile();if(!document.getElementById('am').classList.contains('h'))hideAuth();if(!document.getElementById('ce').classList.contains('h'))closeCaseEditor();}});

populateCompareSelects();
renderStats();
initMap();
loadHash();

const SEED_CASES=[
{id:'case-01',type:'charter',country:'CA',
title:'Case 01 — Charter Breaches (Police / Government)',
verdict:'Forced entry during wellness check with no warrant and no clear emergency. If initial entry was unlawful, all subsequent police actions may flow from that breach, creating a cumulative and substantial Charter claim.',
sections:['Section 7','Section 8','Section 9','Section 10','Section 15'],
claims:[
{ref:'Section 7',title:'Life, Liberty and Security',note:'Forced entry and resulting PTSD may constitute a serious infringement of personal safety and autonomy.'},
{ref:'Section 8',title:'Search and Seizure',note:'Home receives the highest level of privacy protection. Entry without lawful authority may be unconstitutional.'},
{ref:'Section 9',title:'Arbitrary Detention',note:'Restricting movement inside own home without lawful grounds may amount to arbitrary detention.'},
{ref:'Section 10',title:'Rights on Arrest',note:'If effectively detained, police were required to explain reasons and advise right to counsel.'},
{ref:'Section 15',title:'Equality Rights',note:'Treating a mental health situation as a criminal confrontation rather than a care response may raise equality concerns.'},
],
bottomLine:'If initial entry was unlawful, a lawyer could argue all subsequent police actions flowed from that breach — creating a cumulative and substantial Charter claim.'
},
{id:'case-0002',type:'civil',country:'CA',
title:'CASE-0002 — Civil Claim Against Private Parties',
verdict:'Legitimate civil case. Strongest claims: appropriation of personality and intentional infliction of mental suffering. Recent conduct remains actionable despite older childhood events potentially being time-barred.',
sections:[],
claims:[
{ref:'Appropriation of Personality',title:'Unauthorized Use of Likeness',note:'Especially if image is still being used commercially.'},
{ref:'IIMS',title:'Intentional Infliction of Mental Suffering',note:'Parking lot confrontation and related conduct may meet the legal threshold for outrageous behavior.'},
{ref:'Parental Negligence',title:'Childhood Failures',note:'Potential claim based on failures during childhood.'},
{ref:'Lost Earning Capacity',title:'Economic Damages',note:'Damages available if the conduct impaired ability to work.'},
],
bottomLine:'Weaker than a Charter claim (private parties vs. government) but remains legally viable. Key enforcement advantage: defendants have identifiable assets and property. Build a detailed evidence file regardless of litigation decision.'
}
];
function loadCases(u){const d=localStorage.getItem('ch-cases-'+u);return d?JSON.parse(d):null;}
function saveCases(u,arr){localStorage.setItem('ch-cases-'+u,JSON.stringify(arr));}
let UCases=[];

function phash(s){let h=5381;for(let i=0;i<s.length;i++)h=(h*33^s.charCodeAt(i))>>>0;return h.toString(36);}
function getUsers(){return JSON.parse(localStorage.getItem('ch-users')||'{}');}
function saveUsers(u){localStorage.setItem('ch-users',JSON.stringify(u));}

(function(){const u=getUsers();if(!u['joshua']){u['joshua']={name:'Joshua Trommel',pw:phash('charters')};saveUsers(u);}})();

let CU=null;
try{CU=JSON.parse(sessionStorage.getItem('ch-session')||'null');}catch(e){}
function setSession(s){CU=s;sessionStorage.setItem('ch-session',JSON.stringify(s));}
function clearSession(){CU=null;sessionStorage.removeItem('ch-session');}

let AM_MODE='login';
function showAuth(){document.getElementById('am').classList.remove('h');}
function hideAuth(){
  document.getElementById('am').classList.add('h');
  document.getElementById('am-err').textContent='';
  document.getElementById('am-user').value='';
  document.getElementById('am-pass').value='';
  document.getElementById('am-name').value='';
}
function setAuthMode(m){
  AM_MODE=m;const r=m==='register';
  document.getElementById('am-title').textContent=r?'Create Account':'Sign In';
  document.getElementById('am-sub').textContent=r?'Create Account':'Sign In';
  document.getElementById('am-sw').textContent=r?'Have an account? Sign in':'No account? Register';
  document.getElementById('am-name-wrap').style.display=r?'':'none';
  document.getElementById('am-err').textContent='';
}

function doAuth(){
  const u=document.getElementById('am-user').value.trim().toLowerCase();
  const p=document.getElementById('am-pass').value;
  const n=document.getElementById('am-name').value.trim();
  const err=document.getElementById('am-err');
  if(!u||!p){err.textContent='Username and password required.';return;}
  const users=getUsers();
  if(AM_MODE==='login'){
    if(!users[u]||users[u].pw!==phash(p)){err.textContent='Invalid username or password.';return;}
    setSession({username:u,name:users[u].name});hideAuth();updatePrBtn();openProfile();
  } else {
    if(!n){err.textContent='Display name required.';return;}
    if(u.length<2){err.textContent='Username must be at least 2 characters.';return;}
    if(p.length<6){err.textContent='Password must be at least 6 characters.';return;}
    if(users[u]){err.textContent='Username already taken.';return;}
    users[u]={name:n,pw:phash(p)};saveUsers(users);
    setSession({username:u,name:n});hideAuth();updatePrBtn();openProfile();
  }
}

function updatePrBtn(){document.getElementById('prBtn').classList.toggle('on',!!CU);}

function openProfile(){
  if(!CU){setAuthMode('login');showAuth();return;}
  const stored=loadCases(CU.username);
  UCases=stored||(CU.username==='joshua'?[...SEED_CASES]:[]);
  if(!stored)saveCases(CU.username,UCases);
  renderProfile();
  document.getElementById('pp').classList.add('op');
  document.getElementById('ov').classList.add('on');
}

function closeProfile(){
  document.getElementById('pp').classList.remove('op');
  if(!AC)document.getElementById('ov').classList.remove('on');
}

function mk(tag,cls,txt){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(txt!=null)e.textContent=txt;
  return e;
}

function renderProfile(){
  document.getElementById('pp-name').textContent=CU.name;
  const body=document.getElementById('pp-body');
  body.replaceChildren();
  const hdrRow=mk('div','pp-sec-h');
  hdrRow.appendChild(mk('span',null,'My Cases'));
  const addBtn=mk('button','pp-add-btn','+');
  addBtn.title='New case';
  addBtn.addEventListener('click',()=>openCaseEditor(null));
  hdrRow.appendChild(addBtn);
  body.appendChild(hdrRow);
  UCases.forEach((cs,idx)=>{
    const card=mk('div','cs-card');
    const del=mk('button','cs-del','×');
    del.title='Delete case';
    del.addEventListener('click',()=>{UCases.splice(idx,1);saveCases(CU.username,UCases);renderProfile();});
    card.appendChild(del);
    card.appendChild(mk('span','cs-type '+cs.type,cs.type==='charter'?'Charter Claim':'Civil Claim'));
    card.appendChild(mk('div','cs-title',cs.title));
    if(cs.verdict)card.appendChild(mk('div','cs-verdict',cs.verdict));
    if(cs.sections&&cs.sections.length){
      card.appendChild(mk('div','cs-sl-h','Relevant Sections'));
      const secsDiv=mk('div','cs-secs');
      cs.sections.forEach(s=>{
        const link=mk('span','cs-slink',s);
        link.addEventListener('click',()=>{
          closeProfile();switchView('map');openPanel(cs.country||'CA');
          setTimeout(()=>{const ps=document.getElementById('ps');ps.value=s;const c=D.find(x=>x.id===(cs.country||'CA'));if(c)renderPanel(c,s);},350);
        });
        secsDiv.appendChild(link);
      });
      card.appendChild(secsDiv);
    }
    if(cs.claims&&cs.claims.length){
      const claimsDiv=mk('div','cs-claims');
      cs.claims.forEach(cl=>{
        const claim=mk('div','cs-claim');
        claim.appendChild(mk('div','cs-cref',cl.ref));
        claim.appendChild(mk('div','cs-ctit',cl.title));
        if(cl.note)claim.appendChild(mk('div','cs-cnote',cl.note));
        claimsDiv.appendChild(claim);
      });
      card.appendChild(claimsDiv);
    }
    if(cs.bottomLine){
      const bot=mk('div','cs-bottom');
      bot.appendChild(mk('div','cs-bl','Bottom Line'));
      bot.appendChild(mk('span',null,cs.bottomLine));
      card.appendChild(bot);
    }
    body.appendChild(card);
  });
  if(!UCases.length){body.appendChild(mk('div','cpe','No cases yet. Click + to add one.'));}
  const lo=mk('button','pp-logout','Sign out');
  lo.addEventListener('click',()=>{clearSession();updatePrBtn();closeProfile();});
  body.appendChild(lo);
}

let CE_CLAIMS=[];
function openCaseEditor(cs){
  CE_CLAIMS=cs&&cs.claims?cs.claims.map(c=>({...c})):[];
  document.getElementById('ce-ttl').value=cs?cs.title:'';
  document.getElementById('ce-typ').value=cs?cs.type:'charter';
  document.getElementById('ce-verd').value=cs?cs.verdict:'';
  document.getElementById('ce-bl').value=cs?cs.bottomLine:'';
  renderCEClaims();
  document.getElementById('ce').classList.remove('h');
  document.getElementById('ce').dataset.eid=cs?cs.id:'';
}
function closeCaseEditor(){document.getElementById('ce').classList.add('h');}
function renderCEClaims(){
  const wrap=document.getElementById('ce-cw');
  wrap.replaceChildren();
  CE_CLAIMS.forEach((cl,i)=>{
    const row=mk('div','ce-claim-row');
    const rf=mk('input','am-inp');rf.placeholder='Ref';rf.value=cl.ref||'';
    rf.addEventListener('input',e=>CE_CLAIMS[i].ref=e.target.value);
    const ti=mk('input','am-inp');ti.placeholder='Title';ti.value=cl.title||'';
    ti.addEventListener('input',e=>CE_CLAIMS[i].title=e.target.value);
    const no=mk('input','am-inp');no.placeholder='Note';no.value=cl.note||'';
    no.addEventListener('input',e=>CE_CLAIMS[i].note=e.target.value);
    const rm=mk('button','ce-rm','×');
    rm.addEventListener('click',()=>{CE_CLAIMS.splice(i,1);renderCEClaims();});
    row.appendChild(rf);row.appendChild(ti);row.appendChild(no);row.appendChild(rm);
    wrap.appendChild(row);
  });
}
function saveCaseFromEditor(){
  const title=document.getElementById('ce-ttl').value.trim();
  if(!title)return;
  const eid=document.getElementById('ce').dataset.eid;
  const newCase={
    id:eid||'case-'+Date.now(),
    type:document.getElementById('ce-typ').value,
    country:'CA',
    title,
    verdict:document.getElementById('ce-verd').value.trim(),
    sections:[],
    claims:CE_CLAIMS.map(c=>({...c})),
    bottomLine:document.getElementById('ce-bl').value.trim()
  };
  if(eid){const idx=UCases.findIndex(x=>x.id===eid);if(idx>-1)UCases[idx]=newCase;else UCases.push(newCase);}
  else UCases.push(newCase);
  saveCases(CU.username,UCases);
  renderProfile();
  closeCaseEditor();
}
document.getElementById('ce-ac').addEventListener('click',()=>{CE_CLAIMS.push({ref:'',title:'',note:''});renderCEClaims();});
document.getElementById('ce-save').addEventListener('click',saveCaseFromEditor);
document.getElementById('ce-cancel').addEventListener('click',closeCaseEditor);
document.getElementById('ce').addEventListener('click',e=>{if(e.target===document.getElementById('ce'))closeCaseEditor();});

document.getElementById('prBtn').addEventListener('click',()=>{
  if(CU){const pp=document.getElementById('pp');if(pp.classList.contains('op'))closeProfile();else openProfile();}
  else{setAuthMode('login');showAuth();}
});
document.getElementById('am-sub').addEventListener('click',doAuth);
document.getElementById('am-sw').addEventListener('click',()=>setAuthMode(AM_MODE==='login'?'register':'login'));
document.getElementById('am-user').addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});
document.getElementById('am-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});
document.getElementById('am').addEventListener('click',e=>{if(e.target===document.getElementById('am'))hideAuth();});
document.getElementById('ppClose').addEventListener('click',closeProfile);
updatePrBtn();
</script>
</body>
</html>
