name: WiretextIOS
options:
  bundleIdPrefix: com.nulljosh
  deploymentTarget:
    iOS: "17.0"
settings:
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
  DEVELOPMENT_TEAM: QMM486NPYC
targets:
  WiretextIOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.wiretext-ios
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  WiretextIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests]
    dependencies:
      - target: WiretextIOS
