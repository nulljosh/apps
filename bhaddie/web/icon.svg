<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" style="background:#0a0a0f;border-radius:40px">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2d78"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Radar rings -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.2"/>
  <circle cx="100" cy="100" r="50" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.35"/>
  <circle cx="100" cy="100" r="30" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.5"/>
  <!-- Center blip -->
  <circle cx="100" cy="100" r="8" fill="#ff2d78"/>
  <circle cx="100" cy="100" r="12" fill="#ff2d78" opacity="0.3"/>
  <!-- Satellite blips -->
  <circle cx="68" cy="72" r="4" fill="#8b5cf6"/>
  <circle cx="138" cy="85" r="3.5" fill="#06b6d4"/>
  <circle cx="82" cy="135" r="3" fill="#ff2d78" opacity="0.7"/>
  <circle cx="145" cy="125" r="4" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="55" cy="108" r="3" fill="#06b6d4" opacity="0.6"/>
  <!-- Crosshairs -->
  <line x1="100" y1="25" x2="100" y2="40" stroke="url(#g)" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="160" x2="100" y2="175" stroke="url(#g)" stroke-width="1" opacity="0.4"/>
  <line x1="25" y1="100" x2="40" y2="100" stroke="url(#g)" stroke-width="1" opacity="0.4"/>
  <line x1="160" y1="100" x2="175" y2="100" stroke="url(#g)" stroke-width="1" opacity="0.4"/>
</svg>
