name: GrapherIOS
options:
  bundleIdPrefix: com.nulljosh
  deploymentTarget:
    iOS: "17.0"
settings:
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
  DEVELOPMENT_TEAM: QMM486NPYC
targets:
  GrapherIOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.grapher-ios
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GENERATE_INFOPLIST_FILE: YES
  GrapherIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests]
    dependencies:
      - target: GrapherIOS
  GrapherIOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: GrapherIOS
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.grapher-ios.uitests
      GENERATE_INFOPLIST_FILE: YES
