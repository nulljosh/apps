name: Portfolio
options:
  bundleIdPrefix: com.heyitsmejosh
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Portfolio:
    type: application
    platform: iOS
    sources:
      - PortfolioApp.swift
      - Models
      - Views
      - API
      - path: Assets.xcassets
        buildPhase: resources
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.portfolio-ios
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QMM486NPYC
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  PortfolioMac:
    type: application
    platform: macOS
    sources:
      - PortfolioApp.swift
      - Models
      - Views
      - API
      - path: Assets.xcassets
        buildPhase: resources
    info:
      path: Info-Mac.plist
      properties:
        NSHumanReadableCopyright: "© 2026 Joshua Trommel"
        LSMinimumSystemVersion: "14.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.portfolio-mac
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QMM486NPYC
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  PortfolioTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: Portfolio
