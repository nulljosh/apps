name: Acupuncture
options:
  bundleIdPrefix: com.nulljosh
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: QMM486NPYC
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Acupuncture
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Acupuncture:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Assets.xcassets
  AcupunctureTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: Acupuncture
