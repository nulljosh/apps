name: Wiretext
options:
  bundleIdPrefix: com.nulljosh
  deploymentTarget:
    macOS: "14.0"
settings:
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
  DEVELOPMENT_TEAM: QMM486NPYC
targets:
  Wiretext:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Assets.xcassets
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.wiretext
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ENABLE_HARDENED_RUNTIME: YES
  WiretextTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests]
    dependencies:
      - target: Wiretext
